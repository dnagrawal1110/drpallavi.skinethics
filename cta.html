<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA Tracker — Dr. Pallavi Content Calendar</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f7;
      --surface: #ffffff;
      --border: #e2e4ea;
      --text: #1a1d2e;
      --muted: #6b7280;
      --header-bg: #1a1d2e;

      --automated-color: #16a34a;
      --automated-bg:    #dcfce7;
      --needed-color:    #dc2626;
      --needed-bg:       #fee2e2;
      --not-needed-color:#6b7280;
      --not-needed-bg:   #f3f4f6;
      --tbd-color:       #92600a;
      --tbd-bg:          #fef3c7;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: var(--header-bg);
      color: #fff;
      padding: 18px 28px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 17px; font-weight: 700; }
    .page-header p  { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .header-tag {
      font-size: 11px; color: #9ca3af;
      background: rgba(255,255,255,.08);
      padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    }

    /* ── STATS ── */
    .stats-row {
      display: flex; gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-cell {
      flex: 1; background: var(--surface);
      padding: 12px 16px; text-align: center;
    }
    .stat-cell .n { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-cell .l { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
    .s-auto  .n { color: var(--automated-color); }
    .s-need  .n { color: var(--needed-color); }
    .s-tbd   .n { color: var(--tbd-color); }
    .s-none  .n { color: var(--not-needed-color); }

    /* ── CONTROLS ── */
    .controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 5px 13px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer; color: var(--muted);
      transition: all .15s;
    }
    .filter-btn:hover { border-color: #aaa; color: var(--text); }
    .filter-btn.active { background: var(--header-bg); color: #fff; border-color: var(--header-bg); }
    .filter-btn.fa.active  { background: var(--automated-color); border-color: var(--automated-color); }
    .filter-btn.fn.active  { background: var(--needed-color);    border-color: var(--needed-color); }
    .filter-btn.ftbd.active{ background: var(--tbd-color);       border-color: var(--tbd-color); }

    .search-wrap { margin-left: auto; position: relative; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    #search {
      padding: 6px 12px 6px 30px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 12px; color: var(--text);
      outline: none; width: 220px; background: var(--bg);
    }
    #search:focus { border-color: #888; background: #fff; }

    /* ── TABLE ── */
    .table-wrap { padding: 16px 20px 48px; overflow-x: auto; }

    table {
      width: 100%; border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      min-width: 900px;
    }
    thead tr { background: #f0f2f7; }
    th {
      text-align: left; padding: 9px 13px;
      font-size: 10.5px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f8fc; }
    tr[data-hidden="true"] { display: none; }

    /* status accent stripe */
    tr.r-automated  { border-left: 3px solid var(--automated-color); }
    tr.r-needed     { border-left: 3px solid var(--needed-color); }
    tr.r-not-needed { border-left: 3px solid #d1d5db; }
    tr.r-tbd        { border-left: 3px solid #fbbf24; }

    td { padding: 9px 13px; vertical-align: middle; }

    .c-num  { width: 55px; text-align: center; font-weight: 700; font-size: 12px; color: var(--muted); }
    .c-dress{ width: 60px; }
    .c-title{ min-width: 260px; font-weight: 500; line-height: 1.4; }
    .c-trig { width: 90px; }
    .c-cta  { width: 110px; }
    .c-date { width: 80px; color: var(--muted); font-size: 12px; }
    .c-link { width: 130px; }

    /* badges */
    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .b-auto { background: var(--automated-bg); color: var(--automated-color); }
    .b-need { background: var(--needed-bg);    color: var(--needed-color); }
    .b-none { background: var(--not-needed-bg);color: var(--not-needed-color); }
    .b-tbd  { background: var(--tbd-bg);       color: var(--tbd-color); }

    .dress-pill {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      font-size: 10px; font-weight: 600; background: #ede9fe; color: #5b21b6;
    }
    .dress-pill.d8 { background: #fff3cd; color: #92600a; }

    .trigger-code {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-family: 'SF Mono', monospace; font-size: 11px; font-weight: 700;
      background: #1a1d2e; color: #e2e8f0; letter-spacing: .5px;
    }

    .guide-btn {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--automated-color); text-decoration: none;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 5px;
      background: var(--automated-bg);
      transition: opacity .15s;
    }
    .guide-btn:hover { opacity: .75; }

    .empty-state {
      text-align: center; padding: 50px 20px;
      color: var(--muted); font-size: 13px;
      display: none;
    }

    /* dress group divider */
    tr.dress-divider td {
      background: #f8f9fc; padding: 6px 13px;
      font-size: 10px; font-weight: 700; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 1px;
      border-top: 2px solid #e5e7eb;
    }
  </style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <h1>CTA Tracker — Dr. Pallavi Script Calendar</h1>
    <p>Internal agency dashboard · drpallaviskinethics.vercel.app</p>
  </div>
  <div class="header-tag">Scripts 01 – 38 · May 2026</div>
</div>

<!-- STATS STRIP -->
<div class="stats-row">
  <div class="stat-cell s-auto">
    <div class="n" id="st-auto">—</div>
    <div class="l">✅ Automated</div>
  </div>
  <div class="stat-cell s-need">
    <div class="n" id="st-need">—</div>
    <div class="l">🔴 Needed</div>
  </div>
  <div class="stat-cell s-tbd">
    <div class="n" id="st-tbd">—</div>
    <div class="l">🟡 TBD</div>
  </div>
  <div class="stat-cell s-none">
    <div class="n" id="st-none">—</div>
    <div class="l">⚪ Not Needed</div>
  </div>
  <div class="stat-cell">
    <div class="n" id="st-total">—</div>
    <div class="l">Total Scripts</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="filter-btn active" data-f="all">All</button>
  <button class="filter-btn fa"   data-f="automated">✅ Automated</button>
  <button class="filter-btn fn"   data-f="needed">🔴 Needed</button>
  <button class="filter-btn ftbd" data-f="tbd">🟡 TBD</button>
  <button class="filter-btn"     data-f="not-needed">⚪ Not Needed</button>

  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="text" placeholder="Search script title…">
  </div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="c-num">#</th>
        <th class="c-dress">Dress</th>
        <th class="c-title">Script Title</th>
        <th class="c-trig">DM Trigger</th>
        <th class="c-cta">CTA Status</th>
        <th class="c-date">Insta Date</th>
        <th class="c-link">Guide Link</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-state" id="empty">No matching scripts found.</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const SCRIPTS = [
  // DRESS 1 ────────────────────────────────────────────────────────────────
  { n:1,  dress:1, title:'Mumbai Ke Paani Ka Baalon Pe Asar',              trigger:'WATER',   cta:'automated', link:'guide-water.html',  date:'13 May' },
  { n:2,  dress:1, title:'Chemical Peel, Does It Hurt? [PROCEDURE]',       trigger:'PEEL',    cta:'automated', link:'guide-peel.html',   date:'28 May' },
  { n:3,  dress:1, title:'3 Myths Jo Hair Fall Band Nahi Hone De Rahe',    trigger:'REAL',    cta:'automated', link:'guide-real.html',   date:'' },
  { n:4,  dress:1, title:'Indian Hair Is Best — But We Destroy It',        trigger:'INDIAN',  cta:'automated', link:'guide-indian.html', date:'' },
  { n:5,  dress:1, title:'Besan Ubtan — Derma Ka Honest Opinion',          trigger:'UBTAN',   cta:'automated', link:'guide-ubtan.html',  date:'' },

  // DRESS 2 ────────────────────────────────────────────────────────────────
  { n:6,  dress:2, title:'Rice Water for Hair, Miracle or Myth?',          trigger:'',        cta:'not-needed',link:'',                  date:'9 May' },
  { n:7,  dress:2, title:'Coconut Oil on Face, Acne-Prone Skin Ka Kya?',   trigger:'',        cta:'not-needed',link:'',                  date:'2 May' },
  { n:8,  dress:2, title:'Stress Aur Baal, Cortisol Connection',           trigger:'',        cta:'not-needed',link:'',                  date:'16 May' },
  { n:9,  dress:2, title:'PRP for Hair, Kya Hota Hai Actually',            trigger:'PRP',     cta:'needed',    link:'',                  date:'29 May' },

  // DRESS 3 ────────────────────────────────────────────────────────────────
  { n:10, dress:3, title:'Laser Hair Removal',                              trigger:'LASER',   cta:'needed',    link:'',                  date:'19 May' },
  { n:11, dress:3, title:'Hydration vs Moisturisation, Same Nahi Hain…',   trigger:'ROUTINE', cta:'automated', link:'guide-m.html',      date:'31 May' },
  { n:12, dress:3, title:'Aloe Vera Garden Se — Safe Hai Ya Nahi?',        trigger:'',        cta:'tbd',       link:'',                  date:'' },
  { n:13, dress:3, title:'Niacinamide Kya Karta Hai — Zero Jargon',        trigger:'',        cta:'not-needed',link:'',                  date:'' },
  { n:14, dress:3, title:'Maine altBeauty Kyun Banaya [altBEAUTY]',        trigger:'',        cta:'needed',    link:'',                  date:'' },
  { n:15, dress:3, title:'Bachchon Ki Skin Care',                          trigger:'',        cta:'tbd',       link:'',                  date:'' },

  // DRESS 4 ────────────────────────────────────────────────────────────────
  { n:16, dress:4, title:'Mumbai–Pune Mein Serum Kaam Kyun Nahi Karta (Hard Water)',trigger:'',cta:'needed',  link:'',                  date:'22 May' },
  { n:17, dress:4, title:'Grey Baal — Hollow Glass Tube Ka Raaz',          trigger:'',        cta:'needed',    link:'',                  date:'' },
  { n:18, dress:4, title:'Biotin Gummies Se Hair Fall Nahi Rukta',         trigger:'',        cta:'tbd',       link:'',                  date:'' },
  { n:19, dress:4, title:'Cotton Pillowcase — Invisible Breakage',         trigger:'',        cta:'tbd',       link:'',                  date:'' },

  // DRESS 5 ────────────────────────────────────────────────────────────────
  { n:20, dress:5, title:'Dhoop Aapke Baalon Ko Bleach Kar Rahi Hai',      trigger:'',        cta:'needed',    link:'',                  date:'' },
  { n:21, dress:5, title:'Scalp Ki Micro-Inflammation — Silent Hair Damage',trigger:'',       cta:'needed',    link:'',                  date:'23 May' },
  { n:22, dress:5, title:'Weight Loss Ke Baad Hair Fall: Body Ka Power Saver Mode',trigger:'',cta:'tbd',      link:'',                  date:'' },
  { n:23, dress:5, title:'Rice Water Se Baal Toot Rahe Hain',              trigger:'',        cta:'tbd',       link:'',                  date:'' },

  // DRESS 6 ────────────────────────────────────────────────────────────────
  { n:24, dress:6, title:'Swiss Cheese Jaisi Skin — Moisturiser Leak Ho Raha Hai',trigger:'', cta:'needed',   link:'',                  date:'25 May' },
  { n:25, dress:6, title:'Aapka Glow Dead Cells Ke Neeche Daba Hai',       trigger:'',        cta:'tbd',       link:'',                  date:'' },
  { n:26, dress:6, title:'Screen Se Indoor Pigmentation — Blue Light Ka Sach',trigger:'SCREEN',cta:'tbd',     link:'',                  date:'' },
  { n:27, dress:6, title:'Oily Nahi, Dehydrated Skin Hai Aapki (Sponge Theory)',trigger:'SPONGE',cta:'tbd',   link:'',                  date:'' },

  // DRESS 7 ────────────────────────────────────────────────────────────────
  { n:28, dress:7, title:'Skin Mein Silent Fire — Inflammaging',           trigger:'FIRE',    cta:'needed',    link:'',                  date:'26 May' },
  { n:29, dress:7, title:'Skin Ka pH Security Guard — Soap Ne Nikaal Diya',trigger:'GUARD',   cta:'tbd',       link:'',                  date:'' },
  { n:30, dress:7, title:'Cheeni Aapke Collagen Ko Tod Rahi Hai (Glycation)',trigger:'SUGAR', cta:'tbd',       link:'',                  date:'' },
  { n:31, dress:7, title:'Psoriasis Aur Eczema — Sirf Skin Ki Nahi, Gut Ki Bimari Hai',trigger:'',cta:'tbd',  link:'',                  date:'' },
  { n:32, dress:7, title:'Chin Par Acne? Facewash Kaam Nahi Karega',       trigger:'',        cta:'tbd',       link:'',                  date:'' },
  { n:33, dress:7, title:'Hemoglobin Kam? Glow Serum Koi Kaam Ka Nahi',    trigger:'',        cta:'tbd',       link:'',                  date:'' },

  // DRESS 8 (Rating Series) ─────────────────────────────────────────────────
  { n:34, dress:8, title:'Rating Dairy Products for Acne',                 trigger:'',        cta:'not-needed',link:'',                  date:'4 May' },
  { n:35, dress:8, title:'Rating Summer Drinks',                           trigger:'',        cta:'not-needed',link:'',                  date:'7 May' },
  { n:36, dress:8, title:'Rating Snacks for Hair & Skin Health',           trigger:'',        cta:'not-needed',link:'',                  date:'10 May' },
  { n:37, dress:8, title:'Rating Breakfast Items — The Skin-Gut Link',     trigger:'',        cta:'not-needed',link:'',                  date:'' },
  { n:38, dress:8, title:'Rating Hair Oils — The Truth About Champi',      trigger:'',        cta:'not-needed',link:'',                  date:'' },
];

// ── RENDER ────────────────────────────────────────────────────────────────
const BADGE = {
  'automated':  ['b-auto','✅ Automated'],
  'needed':     ['b-need','🔴 Needed'],
  'not-needed': ['b-none','⚪ Not Needed'],
  'tbd':        ['b-tbd', '🟡 TBD'],
};

function dressLabel(d) {
  const cls = d === 8 ? 'dress-pill d8' : 'dress-pill';
  return `<span class="${cls}">Dress ${d}</span>`;
}

function triggerCell(t) {
  return t ? `<span class="trigger-code">${t}</span>` : `<span style="color:#d1d5db;">—</span>`;
}

function linkCell(l) {
  if (!l) return `<span style="color:#d1d5db;font-size:12px;">—</span>`;
  return `<a class="guide-btn" href="${l}" target="_blank">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg>View Guide</a>`;
}

function buildRows() {
  const tbody = document.getElementById('tbody');
  let lastDress = null;
  let html = '';

  SCRIPTS.forEach(s => {
    if (s.dress !== lastDress) {
      const label = s.dress === 8 ? 'Dress 8 — Rating Series' : `Dress ${s.dress}`;
      html += `<tr class="dress-divider"><td colspan="7">${label}</td></tr>`;
      lastDress = s.dress;
    }
    const [badgeCls, badgeTxt] = BADGE[s.cta];
    const num = String(s.n).padStart(2,'0');
    html += `
      <tr class="r-${s.cta}" data-cta="${s.cta}" data-title="${s.title.toLowerCase()} script ${num}">
        <td class="c-num">${num}</td>
        <td class="c-dress">${dressLabel(s.dress)}</td>
        <td class="c-title">${s.title}</td>
        <td class="c-trig">${triggerCell(s.trigger)}</td>
        <td class="c-cta"><span class="badge ${badgeCls}">${badgeTxt}</span></td>
        <td class="c-date">${s.date || '<span style="color:#d1d5db;">—</span>'}</td>
        <td class="c-link">${linkCell(s.link)}</td>
      </tr>`;
  });
  tbody.innerHTML = html;
}

function updateStats() {
  const visible = [...document.querySelectorAll('#tbody tr:not(.dress-divider):not([data-hidden="true"])')];
  const c = {automated:0, needed:0, tbd:0, 'not-needed':0};
  visible.forEach(r => { const k = r.dataset.cta; if(k in c) c[k]++; });
  document.getElementById('st-auto').textContent  = c.automated;
  document.getElementById('st-need').textContent  = c.needed;
  document.getElementById('st-tbd').textContent   = c.tbd;
  document.getElementById('st-none').textContent  = c['not-needed'];
  document.getElementById('st-total').textContent = visible.length;
}

function applyFilters() {
  const filter = document.querySelector('.filter-btn.active').dataset.f;
  const q = document.getElementById('search').value.toLowerCase().trim();

  document.querySelectorAll('#tbody tr:not(.dress-divider)').forEach(r => {
    const matchF = filter === 'all' || r.dataset.cta === filter;
    const matchQ = !q || (r.dataset.title||'').includes(q);
    r.setAttribute('data-hidden', (!matchF || !matchQ) ? 'true' : 'false');
  });

  // hide dress dividers with no visible rows
  document.querySelectorAll('#tbody tr.dress-divider').forEach(div => {
    let sib = div.nextElementSibling;
    let vis = false;
    while (sib && !sib.classList.contains('dress-divider')) {
      if (sib.getAttribute('data-hidden') !== 'true') { vis = true; break; }
      sib = sib.nextElementSibling;
    }
    div.style.display = vis ? '' : 'none';
  });

  const anyVis = !!document.querySelector('#tbody tr:not(.dress-divider)[data-hidden="false"]')
               || !!document.querySelector('#tbody tr:not(.dress-divider):not([data-hidden])');
  document.getElementById('empty').style.display = anyVis ? 'none' : 'block';
  updateStats();
}

// Init
buildRows();
updateStats();

// Events
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input', applyFilters);
</script>
</body>
</html>
